<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tập Chi Tiết</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 text-sm text-gray-500">
            <a href="index.html" class="hover:text-blue-600 font-medium">Khóa học</a>
            <i class="fa-solid fa-chevron-right text-xs text-gray-300"></i>
            <span class="text-gray-400">Phương pháp tư duy</span>
            <i class="fa-solid fa-chevron-right text-xs text-gray-300"></i>
            <span class="text-gray-900 font-medium" id="breadcrumb-active">Đang tải...</span>
        </div>
        <a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-4 py-2 rounded-xl font-bold transition flex items-center gap-2">
            <i class="fa-solid fa-gauge"></i> Dashboard
        </a>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            
            <div class="aspect-video w-full bg-black rounded-2xl overflow-hidden shadow-xs relative">
                <iframe id="youtube-player" class="w-full h-full" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            
            <p class="text-xs text-gray-400 italic text-center py-1">
                ✨ Hệ thống bài giảng độc quyền thuộc chuỗi phát triển năng lực toàn diện.
            </p>

            <div class="bg-white border border-gray-100 rounded-2xl p-4 flex flex-col md:flex-row items-center gap-4 shadow-xs">
                <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-xl shrink-0">
                    <i class="fa-solid fa-volume-high"></i>
                </div>
                
                <div class="flex-1 w-full space-y-2">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[10px] bg-purple-100 text-purple-700 font-extrabold px-2 py-0.5 rounded-md tracking-wider uppercase">Podcast</span>
                            <h4 class="font-bold text-gray-800 text-sm mt-1" id="podcast-title">File âm thanh bài học</h4>
                        </div>
                        <span class="text-xs text-gray-400 font-medium bg-gray-100 px-2 py-0.5 rounded-md">1x</span>
                    </div>
                    
                    <div class="flex items-center gap-3 w-full">
                        <span class="text-xs text-gray-400 font-medium" id="audio-time">0:00</span>
                        <input type="range" id="audio-slider" min="0" max="100" value="0" class="flex-1 h-1 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        <span class="text-xs text-gray-400 font-medium" id="audio-duration">5:40</span>
                    </div>
                </div>

                <div class="flex items-center gap-4 shrink-0 justify-center w-full md:w-auto pt-2 md:pt-0">
                    <button class="text-gray-400 hover:text-gray-600 transition text-sm"><i class="fa-solid fa-backward-step"></i></button>
                    <button onclick="toggleAudio()" id="btn-audio-play" class="w-11 h-11 rounded-full bg-blue-600 text-white flex items-center justify-center text-lg shadow-sm hover:bg-blue-700 transition">
                        <i class="fa-solid fa-play ml-0.5"></i>
                    </button>
                    <button class="text-gray-400 hover:text-gray-600 transition text-sm"><i class="fa-solid fa-forward-step"></i></button>
                </div>
            </div>

            <audio id="real-audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        </div>

        <div class="space-y-4">
            <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-xs">
                
                <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                    <div class="flex items-center gap-2 text-gray-800 font-bold mb-2">
                        <i class="fa-solid fa-book-bookmark text-blue-600 text-sm"></i>
                        <h3 class="text-sm uppercase tracking-wide">Nội dung khóa học</h3>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-500 mb-1">
                        <span>Tiến độ hoàn thành:</span>
                        <span class="font-bold text-blue-600">33%</span>
                    </div>
                    <div class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-blue-600 h-full w-[33%]"></div>
                    </div>
                </div>

                <div id="sidebar-lessons-list" class="divide-y divide-gray-50 max-h-[500px] overflow-y-auto">
                    </div>
            </div>
        </div>

    </main>

    <script>
        // Danh sách 3 video chuẩn của bạn từ trang chủ
        const lessonsData = [
            { id: 1, title: "Bài 1: Hướng nghiệp và Kỹ năng thiết yếu cho học sinh", videoId: "7ZP7aem_FOU" },
            { id: 2, title: "Bài 2: Phương pháp tư duy & Lựa chọn tương lai", videoId: "taasiTENJc0" },
            { id: 3, title: "Bài 3: Cẩm nang phát triển năng lực bản thân", videoId: "KrNLHPT2aJw" }
        ];

        function initLessonPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentVideoId = urlParams.get('v') || lessonsData[0].videoId;
            const currentTitle = urlParams.get('title') ? decodeURIComponent(urlParams.get('title')) : lessonsData[0].title;

            // 1. Gán dữ liệu cho khung phát Video chính và tiêu đề điều hướng
            document.getElementById('breadcrumb-active').innerText = currentTitle;
            document.getElementById('podcast-title').innerText = currentTitle;
            document.getElementById('youtube-player').src = `https://www.youtube.com/embed/${currentVideoId}?rel=0&modestbranding=1&showinfo=0`;
            document.title = currentTitle;

            // 2. Tự động dựng cây danh sách bài học bên thanh phải giống hệt Thinking School
            const sidebarContainer = document.getElementById('sidebar-lessons-list');
            sidebarContainer.innerHTML = lessonsData.map(lesson => {
                const isActive = lesson.videoId === currentVideoId;
                const targetUrl = `lesson.html?v=${lesson.videoId}&title=${encodeURIComponent(lesson.title)}`;

                if (isActive) {
                    // Giao diện cho bài đang chọn học (Có màu nền xanh lam nhạt, chữ xanh)
                    return `
                        <div class="p-4 bg-blue-50/60 flex items-start gap-3 border-l-4 border-blue-600">
                            <i class="fa-regular fa-circle-play text-blue-600 text-base mt-0.5 shrink-0"></i>
                            <div class="flex-1">
                                <span class="text-blue-600 font-semibold text-xs">Đang học</span>
                                <p class="text-xs font-bold text-blue-900 mt-0.5">${lesson.title}</p>
                            </div>
                        </div>
                    `;
                } else {
                    // Giao diện cho các bài học còn lại trong danh sách
                    return `
                        <a href="${targetUrl}" class="p-4 flex items-start gap-3 hover:bg-gray-50 transition group block">
                            <i class="fa-regular fa-circle text-gray-400 group-hover:text-gray-600 text-base mt-0.5 shrink-0"></i>
                            <div class="flex-1">
                                <p class="text-xs font-medium text-gray-600 group-hover:text-gray-900 transition">${lesson.title}</p>
                            </div>
                        </a>
                    `;
                }
            }).join('');
        }

        // TÍNH NĂNG PHÁT/TẠM DỪNG CỦA THANH PODCAST
        const audioEl = document.getElementById('real-audio');
        const playBtn = document.getElementById('btn-audio-play');
        
        function toggleAudio() {
            if (audioEl.paused) {
                audioEl.play();
                playBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
            } else {
                audioEl.pause();
                playBtn.innerHTML = `<i class="fa-solid fa-play ml-0.5"></i>`;
            }
        }

        // ĐỒNG BỘ THANH TRƯỢT THỜI GIAN THEO NHẠC
        audioEl.addEventListener('timeupdate', () => {
            const progress = (audioEl.currentTime / audioEl.duration) * 100;
            document.getElementById('audio-slider').value = progress || 0;
            
            // Đổi số phút hiển thị thực tế
            let mins = Math.floor(audioEl.currentTime / 60);
            let secs = Math.floor(audioEl.currentTime % 60);
            document.getElementById('audio-time').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        });

        // BẢO MẬT: CHẶN CHUỘT PHẢI ĐỂ HẠN CHẾ VIỆC NHẤN KIỂM TRA PHẦN TỬ LẤY LINK TẢI VIDEO
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Chạy khởi tạo dữ liệu khi mở trang
        window.onload = initLessonPage;
    </script>
</body>
</html>
