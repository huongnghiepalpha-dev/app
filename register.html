<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Hướng Nghiệp Alpha</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-blue-400/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-purple-400/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="bg-white border border-slate-100 rounded-3xl p-6 md:p-8 shadow-2xl shadow-slate-200/80 w-full max-w-xl z-10">
        
        <div class="text-center mb-6">
            <img src="logo.jpg" alt="Logo Hướng Nghiệp Alpha" class="w-16 h-16 object-contain mx-auto mb-3 rounded-2xl shadow-xs">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Tạo tài khoản học tập</h2>
            <p class="text-xs text-slate-500 mt-1 font-medium">Hệ thống tự động thiết lập lộ trình dựa trên thông tin cá nhân của bạn</p>
        </div>

        <form action="https://api.sheetmonkey.io/form/s4mtNxUZjhLdauN3W3PBFd" method="POST" class="space-y-4">
            
            <input type="hidden" name="x-redirect" value="https://huongnghiepalpha-dev.github.io/app/checkout.html" />

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Họ và tên học sinh</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-sm"><i class="fa-regular fa-user"></i></span>
                    <input type="text" name="Ho_Va_Ten" required placeholder="Ví dụ: Nguyễn Hoàng Nam" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Sinh ngày</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-sm"><i class="fa-regular fa-calendar"></i></span>
                        <input type="date" name="Ngay_Sinh" required class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition text-gray-600">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Học lớp mấy?</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-sm"><i class="fa-solid fa-graduation-cap"></i></span>
                        <select name="Lop_May" required class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition appearance-none text-gray-600">
                            <option value="">-- Chọn khối lớp --</option>
                            <option value="9">Lớp 9</option>
                            <option value="10">Lớp 10</option>
                            <option value="11">Lớp 11</option>
                            <option value="12">Lớp 12</option>
                        </select>
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400 text-xs"><i class="fa-solid fa-chevron-down"></i></span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Trường đang theo học</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-sm"><i class="fa-solid fa-school"></i></span>
                    <input type="text" name="Truong_Hoc" required placeholder="Ví dụ: THPT Lương Thế Vinh" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Tỉnh / Thành phố (Khu vực)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-sm"><i class="fa-solid fa-location-dot"></i></span>
                    <input type="text" name="Khu_Vuc" required placeholder="Ví dụ: Đồng Nai, TP. Hồ Chí Minh..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Số điện thoại liên hệ (Dùng để kích hoạt)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-sm"><i class="fa-solid fa-phone"></i></span>
                    <input type="tel" name="So_Dien_Thoai" required placeholder="Ví dụ: 09693744xx" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
            </div>

            <div class="flex items-start gap-2 pt-1">
                <input type="checkbox" id="terms" checked required class="mt-0.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                <label for="terms" class="text-[11px] text-slate-400 leading-normal font-medium">Cam kết bảo mật thông tin theo tiêu chuẩn an toàn dữ liệu học đường của Alpha School.</label>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl text-sm shadow-lg shadow-blue-500/20 transition-all cursor-pointer mt-2 text-center block">
                Hoàn thành đăng ký & Đến trang thanh toán <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
            </button>
        </form>

        <p class="text-center text-xs text-slate-500 mt-6 font-medium">
            Bạn đã đóng phí kích hoạt? <a href="dashboard.html" class="text-blue-600 font-bold hover:underline">Vào học ngay</a>
        </p>
    </div>

</body>
</html>
